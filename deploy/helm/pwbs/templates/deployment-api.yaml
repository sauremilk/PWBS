apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pwbs.fullname" . }}-api
  labels:
    {{- include "pwbs.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      {{- include "pwbs.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "pwbs.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "pwbs.fullname" . }}-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: POSTGRES_PASSWORD
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: NEO4J_PASSWORD
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: JWT_SECRET_KEY
            - name: ENCRYPTION_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: ENCRYPTION_MASTER_KEY
            {{- if and (eq .Values.llm.provider "claude") .Values.llm.anthropicApiKey }}
            - name: ANTHROPIC_API_KEY
              value: {{ .Values.llm.anthropicApiKey | quote }}
            {{- end }}
            {{- if and (eq .Values.llm.provider "gpt4") .Values.llm.openaiApiKey }}
            - name: OPENAI_API_KEY
              value: {{ .Values.llm.openaiApiKey | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /api/v1/admin/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/v1/admin/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
