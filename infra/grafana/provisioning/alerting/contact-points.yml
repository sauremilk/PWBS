# Grafana Contact Points – Discord Notification (LAUNCH-OPS-002).
apiVersion: 1

contactPoints:
  - orgId: 1
    name: discord-alerts
    receivers:
      - uid: discord-p0p1
        type: discord
        settings:
          url: ${DISCORD_WEBHOOK_URL}
          use_discord_username: true
          message: |
            **{{ .Status | toUpper }}** – {{ .CommonLabels.alertname }}
            {{ range .Alerts }}
            • {{ .Annotations.summary }}
            {{ end }}
        disableResolveMessage: false
