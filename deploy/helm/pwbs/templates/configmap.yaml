apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "pwbs.fullname" . }}-config
  labels:
    {{- include "pwbs.labels" . | nindent 4 }}
data:
  ENVIRONMENT: {{ .Values.api.env.ENVIRONMENT | quote }}
  LOG_LEVEL: {{ .Values.api.env.LOG_LEVEL | quote }}
  DATABASE_URL: "postgresql+asyncpg://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@{{ include "pwbs.fullname" . }}-postgres:5432/pwbs"
  WEAVIATE_URL: "http://{{ include "pwbs.fullname" . }}-weaviate:8080"
  NEO4J_URI: "bolt://{{ include "pwbs.fullname" . }}-neo4j:7687"
  NEO4J_USER: "neo4j"
  REDIS_URL: "redis://{{ include "pwbs.fullname" . }}-redis:6379/0"
  CELERY_BROKER_URL: "redis://{{ include "pwbs.fullname" . }}-redis:6379/0"
  LLM_PROVIDER: {{ .Values.llm.provider | quote }}
  {{- if .Values.ollama.enabled }}
  OLLAMA_BASE_URL: "http://{{ include "pwbs.fullname" . }}-ollama:11434"
  OLLAMA_MODEL: {{ .Values.llm.ollamaModel | quote }}
  {{- end }}
