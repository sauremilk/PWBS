name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  #  Backend Lint
  backend-lint:
    name: Backend Lint (ruff + mypy)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy
        run: mypy pwbs/ --strict

  #  Frontend Lint
  frontend-lint:
    name: Frontend Lint (eslint + tsc)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript type check
        run: npm run type-check

  #  Backend Unit Tests
  backend-unit-tests:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    needs: backend-lint
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short --timeout=120

  #  Alembic Migration Validation (TASK-175)
  migration-check:
    name: Alembic Migration Check
    runs-on: ubuntu-latest
    needs: backend-lint
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: pwbs_migration_test
          POSTGRES_USER: pwbs
          POSTGRES_PASSWORD: pwbs_migration_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pwbs -d pwbs_migration_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://pwbs:pwbs_migration_test@localhost:5432/pwbs_migration_test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Upgrade to head
        run: alembic upgrade head

      - name: Downgrade to base
        run: alembic downgrade base

      - name: Re-upgrade to head (roundtrip)
        run: alembic upgrade head

      - name: Check for schema drift
        run: alembic check

  #  Frontend Unit Tests
  frontend-unit-tests:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    needs: frontend-lint
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --passWithNoTests

  #  Integration Tests (nur auf main)
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    needs: [backend-unit-tests]
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: pwbs_test
          POSTGRES_USER: pwbs
          POSTGRES_PASSWORD: pwbs_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pwbs -d pwbs_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      weaviate:
        image: semitechnologies/weaviate:1.28.2
        ports:
          - 8080:8080
        env:
          QUERY_DEFAULTS_LIMIT: 25
          AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
          PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
          DEFAULT_VECTORIZER_MODULE: "none"
          CLUSTER_HOSTNAME: "node1"
        options: >-
          --health-cmd "curl -f http://localhost:8080/v1/.well-known/ready || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      neo4j:
        image: neo4j:5.26-community
        ports:
          - 7687:7687
          - 7474:7474
        env:
          NEO4J_AUTH: neo4j/test_password
          NEO4J_PLUGINS: '["apoc"]'
        options: >-
          --health-cmd "neo4j status || exit 1"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://pwbs:pwbs_test@localhost:5432/pwbs_test
      WEAVIATE_URL: http://localhost:8080
      NEO4J_URI: bolt://localhost:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: test_password

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev,vector,graph]"

      - name: Run integration tests
        run: pytest tests/integration/ -v --tb=short --timeout=300 -m integration

  # ── Security Audit (LAUNCH-REL-001) ──────────────────────────────────
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies + pip-audit
        working-directory: backend
        run: pip install -e ".[dev]" pip-audit

      - name: pip-audit (backend)
        working-directory: backend
        run: pip-audit --strict --desc on

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: npm audit (frontend)
        working-directory: frontend
        run: npm audit --audit-level=high
