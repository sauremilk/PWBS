<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>PWBS Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 16px;
      background: #fafafa;
      color: #1a1a2e;
    }
    h2 { font-size: 16px; margin-bottom: 12px; color: #16213e; }
    .status { font-size: 13px; margin-bottom: 12px; padding: 8px; border-radius: 6px; }
    .status.ok { background: #d4edda; color: #155724; }
    .status.err { background: #f8d7da; color: #721c24; }
    label { display: block; font-size: 13px; margin-bottom: 4px; font-weight: 500; }
    input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 10px;
    }
    input:focus { outline: none; border-color: #0f3460; }
    button {
      width: 100%;
      padding: 9px;
      background: #0f3460;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      font-weight: 500;
    }
    button:hover { background: #16213e; }
    button.secondary {
      background: transparent;
      color: #721c24;
      border: 1px solid #dc3545;
      margin-top: 8px;
    }
    button.secondary:hover { background: #f8d7da; }
    .field-group { margin-bottom: 8px; }
  </style>
</head>
<body>
  <h2>PWBS Kontext-Sidebar</h2>
  <div id="status" class="status" style="display:none;"></div>

  <div id="login-form">
    <div class="field-group">
      <label for="api-url">API-URL</label>
      <input id="api-url" type="url" value="http://localhost:8000/api/v1" />
    </div>
    <div class="field-group">
      <label for="token">JWT-Token</label>
      <input id="token" type="password" placeholder="eyJhbGciOi..." />
    </div>
    <button id="btn-save">Anmelden</button>
  </div>

  <div id="logged-in" style="display:none;">
    <p style="font-size:13px;margin-bottom:10px;">Authentifiziert. Sidebar ist aktiv.</p>
    <button id="btn-logout" class="secondary">Abmelden</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
