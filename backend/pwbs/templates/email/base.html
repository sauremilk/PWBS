<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ subject }}</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 0; background: #f4f4f7; color: #333; }
  .container { max-width: 600px; margin: 0 auto; background: #fff; }
  .header { background: #1a1a2e; color: #fff; padding: 24px 32px; text-align: center; }
  .header h1 { margin: 0; font-size: 24px; font-weight: 600; }
  .content { padding: 32px; line-height: 1.6; }
  .button { display: inline-block; padding: 12px 24px; background: #2563eb; color: #fff; text-decoration: none; border-radius: 6px; font-weight: 500; }
  .footer { padding: 24px 32px; background: #f4f4f7; text-align: center; font-size: 12px; color: #666; }
  .footer a { color: #2563eb; text-decoration: underline; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>PWBS</h1>
  </div>
  <div class="content">
    {% block content %}{% endblock %}
  </div>
  <div class="footer">
    <p>
      <a href="{{ unsubscribe_url }}">E-Mail-Einstellungen aendern</a> |
      <a href="{{ impressum_url }}">Impressum</a>
    </p>
    <p>Dies ist eine automatische Nachricht von PWBS. Bitte antworten Sie nicht auf diese E-Mail.</p>
  </div>
</div>
</body>
</html>
