<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>PWBS Sidebar</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #fafafa;
      color: #1a1a2e;
      padding: 12px;
      font-size: 13px;
      line-height: 1.5;
    }
    h1 { font-size: 15px; font-weight: 600; margin-bottom: 10px; color: #0f3460; }
    h2 { font-size: 13px; font-weight: 600; margin: 14px 0 6px; color: #16213e; }

    .search-box {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
    }
    .search-box input {
      flex: 1;
      padding: 7px 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 13px;
    }
    .search-box input:focus { outline: none; border-color: #0f3460; }
    .search-box button {
      padding: 7px 12px;
      background: #0f3460;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      white-space: nowrap;
    }
    .search-box button:hover { background: #16213e; }

    .context-bar {
      background: #e8eaf6;
      padding: 8px 10px;
      border-radius: 6px;
      margin-bottom: 12px;
      font-size: 12px;
      color: #283593;
    }
    .context-bar .site { font-weight: 600; text-transform: uppercase; }

    .section { margin-bottom: 14px; }

    .card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      padding: 8px 10px;
      margin-bottom: 6px;
    }
    .card .title { font-weight: 600; font-size: 13px; color: #16213e; }
    .card .meta { font-size: 11px; color: #666; margin-top: 2px; }
    .card .snippet { font-size: 12px; color: #444; margin-top: 4px; }

    .entity-tag {
      display: inline-block;
      background: #e3f2fd;
      color: #1565c0;
      padding: 3px 8px;
      border-radius: 12px;
      font-size: 11px;
      margin: 2px 3px 2px 0;
    }
    .entity-tag.person { background: #fce4ec; color: #c62828; }
    .entity-tag.project { background: #e8f5e9; color: #2e7d32; }
    .entity-tag.decision { background: #fff3e0; color: #e65100; }

    .empty { color: #999; font-style: italic; font-size: 12px; }
    .loading { color: #666; font-size: 12px; }
    .error { color: #d32f2f; font-size: 12px; }
    .not-auth { text-align: center; padding: 20px 0; color: #666; }
  </style>
</head>
<body>
  <h1>PWBS Kontext</h1>

  <div id="not-auth" class="not-auth" style="display:none;">
    Nicht angemeldet. Bitte ueber das Extension-Icon anmelden.
  </div>

  <div id="main-content" style="display:none;">
    <div id="context-bar" class="context-bar" style="display:none;">
      <span class="site" id="ctx-site"></span>: <span id="ctx-title"></span>
    </div>

    <div class="search-box">
      <input id="search-input" type="text" placeholder="Suche im PWBS..." />
      <button id="btn-search">Suchen</button>
    </div>

    <div id="notion-context" class="section" style="display:none;">
      <h2>Notion-Kontext</h2>
      <div id="notion-breadcrumb" style="display:none;"></div>
      <div id="notion-headings" style="display:none;"></div>
    </div>

    <div class="section">
      <h2>Verknuepfte Entitaeten</h2>
      <div id="entities-list"><span class="empty">Seite laden oder suchen...</span></div>
    </div>

    <div class="section">
      <h2>Verwandte Dokumente</h2>
      <div id="docs-list"><span class="empty">Seite laden oder suchen...</span></div>
    </div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
