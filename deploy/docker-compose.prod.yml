# PWBS Self-Hosting  Production Docker Compose (TASK-145)
# Startet die komplette PWBS-Instanz fuer On-Premise-Deployment.
#
# Nutzung:
#   cp deploy/.env.example deploy/.env    # Secrets anpassen
#   docker compose -f deploy/docker-compose.prod.yml up -d
#
# LLM-Umschaltung: LLM_PROVIDER=ollama in .env fuer lokale LLMs

x-backend-env: &backend-env
  DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-pwbs}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-pwbs}
  WEAVIATE_URL: http://weaviate:8080
  NEO4J_URI: bolt://neo4j:7687
  NEO4J_USER: ${NEO4J_USER:-neo4j}
  NEO4J_PASSWORD: ${NEO4J_PASSWORD}
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: redis://redis:6379/0
  ENVIRONMENT: production
  LLM_PROVIDER: ${LLM_PROVIDER:-claude}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
  OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1}
  JWT_SECRET_KEY: ${JWT_SECRET_KEY}
  JWT_ALGORITHM: ${JWT_ALGORITHM:-RS256}
  JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY:-}
  JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:-}
  ENCRYPTION_MASTER_KEY: ${ENCRYPTION_MASTER_KEY}
  CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}

services:
  # -- API -----------------------------------------------------------------
  api:
    image: ${PWBS_IMAGE:-ghcr.io/sauremilk/pwbs-backend:latest}
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      <<: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      weaviate:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/admin/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  # -- Celery Worker  Ingestion -------------------------------------------
  celery-worker-ingestion:
    image: ${PWBS_IMAGE:-ghcr.io/sauremilk/pwbs-backend:latest}
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment:
      <<: *backend-env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: celery -A pwbs.queue.celery_app worker -Q ingestion.high,ingestion.bulk -c 4 --loglevel=info
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # -- Celery Worker  Processing ------------------------------------------
  celery-worker-processing:
    image: ${PWBS_IMAGE:-ghcr.io/sauremilk/pwbs-backend:latest}
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment:
      <<: *backend-env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: celery -A pwbs.queue.celery_app worker -Q processing.embed,processing.extract -c 2 --loglevel=info
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"

  # -- Celery Worker  Briefing --------------------------------------------
  celery-worker-briefing:
    image: ${PWBS_IMAGE:-ghcr.io/sauremilk/pwbs-backend:latest}
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment:
      <<: *backend-env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: celery -A pwbs.queue.celery_app worker -Q briefing.generate -c 2 --loglevel=info
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # -- Celery Beat  Scheduler ---------------------------------------------
  celery-beat:
    image: ${PWBS_IMAGE:-ghcr.io/sauremilk/pwbs-backend:latest}
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment:
      <<: *backend-env
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A pwbs.queue.celery_app beat --loglevel=info
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

  # -- PostgreSQL ----------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pwbs}
      POSTGRES_USER: ${POSTGRES_USER:-pwbs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pwbs} -d ${POSTGRES_DB:-pwbs}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  # -- Weaviate (Vektorsuche) ---------------------------------------------
  weaviate:
    image: semitechnologies/weaviate:1.28.2
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "false"
      AUTHENTICATION_APIKEY_ENABLED: "true"
      AUTHENTICATION_APIKEY_ALLOWED_KEYS: ${WEAVIATE_API_KEY:-changeme}
      AUTHENTICATION_APIKEY_USERS: admin
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
      DEFAULT_VECTORIZER_MODULE: "none"
      CLUSTER_HOSTNAME: "node1"
    volumes:
      - weaviate_data:/var/lib/weaviate
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/.well-known/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"

  # -- Neo4j (Knowledge Graph) --------------------------------------------
  neo4j:
    image: neo4j:5.26-community
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"

  # -- Redis (Queue Broker + Cache) ----------------------------------------
  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # -- Ollama (lokaler LLM, optional) -------------------------------------
  # Nur aktiv wenn LLM_PROVIDER=ollama
  ollama:
    image: ollama/ollama:latest
    profiles:
      - ollama
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: "4.0"

  # -- Frontend ------------------------------------------------------------
  frontend:
    image: ${PWBS_FRONTEND_IMAGE:-ghcr.io/sauremilk/pwbs-frontend:latest}
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

volumes:
  postgres_data:
  weaviate_data:
  neo4j_data:
  redis_data:
  ollama_data:
