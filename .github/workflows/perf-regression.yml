name: Performance Regression

on:
  pull_request:
    branches: [master, main]
    paths:
      - "backend/**"
  push:
    branches: [master, main]
    paths:
      - "backend/**"

concurrency:
  group: perf-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  perf-benchmarks:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: pwbs_perf
          POSTGRES_USER: pwbs
          POSTGRES_PASSWORD: pwbs_perf_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pwbs -d pwbs_perf"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://pwbs:pwbs_perf_test@localhost:5432/pwbs_perf

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run performance benchmarks
        run: |
          pytest tests/performance/ \
            -v \
            --benchmark-json=.benchmarks/current.json \
            --benchmark-min-rounds=5 \
            --benchmark-warmup=on \
            --timeout=120 \
            -m perf
        env:
          PERF_USE_SERVICE_DB: "true"

      - name: Download baseline
        if: github.event_name == 'pull_request'
        uses: actions/download-artifact@v4
        with:
          name: perf-baseline
          path: backend/.benchmarks/
        continue-on-error: true

      - name: Compare to baseline
        if: github.event_name == 'pull_request'
        id: compare
        run: |
          BASELINE_ARG=""
          if [ -f .benchmarks/baseline.json ]; then
            BASELINE_ARG="--baseline .benchmarks/baseline.json"
          fi
          python -m tests.performance.compare_baseline \
            --current .benchmarks/current.json \
            $BASELINE_ARG \
            --thresholds tests/performance/thresholds.yaml \
            --output .benchmarks/report.md || echo "regression=true" >> "$GITHUB_OUTPUT"

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: perf-regression
          path: backend/.benchmarks/report.md

      - name: Upload current as baseline
        if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: perf-baseline
          path: backend/.benchmarks/current.json
          retention-days: 90
          overwrite: true

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-results-${{ github.sha }}
          path: backend/.benchmarks/
          retention-days: 30

      - name: Fail on regression
        if: steps.compare.outputs.regression == 'true'
        run: |
          echo "::error::Performance regression detected! See PR comment for details."
          exit 1
