# Weekly backup-restore integration test (TASK-167).
# Validates that backups for PostgreSQL, Weaviate, and Neo4j can be
# created and restored into fresh containers with data integrity checks.
name: backup-restore-test

on:
  schedule:
    - cron: "0 4 * * 0"  # Every Sunday 04:00 UTC
  workflow_dispatch: {}

jobs:
  postgres-restore:
    name: PostgreSQL Backup & Restore
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: pwbs
          POSTGRES_USER: pwbs
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pwbs"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      minio:
        image: minio/minio:latest
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        ports:
          - 9000:9000
        options: >-
          --health-cmd "curl -f http://localhost:9000/minio/health/live"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      PGHOST: localhost
      PGPORT: "5432"
      PGUSER: pwbs
      PGPASSWORD: test_password
      PGDATABASE: pwbs
      S3_BUCKET: pwbs-backups
      S3_ENDPOINT: http://localhost:9000

    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client awscli
          aws configure set aws_access_key_id minioadmin
          aws configure set aws_secret_access_key minioadmin
          aws configure set default.region us-east-1

      - name: Create S3 bucket
        run: aws --endpoint-url http://localhost:9000 s3 mb s3://pwbs-backups

      - name: Seed test data
        run: |
          psql -c "CREATE TABLE IF NOT EXISTS test_restore (id SERIAL PRIMARY KEY, val TEXT);"
          psql -c "INSERT INTO test_restore (val) VALUES ('alpha'), ('beta');"
          psql -c "SELECT count(*) AS row_count FROM test_restore;"

      - name: Run backup
        run: bash infra/backup/backup_postgres.sh

      - name: Verify backup in S3
        run: aws --endpoint-url http://localhost:9000 s3 ls s3://pwbs-backups/postgres/

      - name: Drop table and restore
        run: |
          psql -c "DROP TABLE IF EXISTS test_restore CASCADE;"
          bash infra/backup/backup_postgres.sh --restore

      - name: Validate data integrity
        run: |
          COUNT=$(psql -t -c "SELECT count(*) FROM test_restore;" | tr -d ' ')
          echo "Rows after restore: $COUNT"
          test "$COUNT" = "2"
          echo "PostgreSQL backup-restore test PASSED"

  weaviate-backup:
    name: Weaviate Backup Validation
    runs-on: ubuntu-latest
    services:
      weaviate:
        image: semitechnologies/weaviate:1.28.2
        env:
          QUERY_DEFAULTS_LIMIT: "25"
          AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
          PERSISTENCE_DATA_PATH: /var/lib/weaviate
          DEFAULT_VECTORIZER_MODULE: none
          ENABLE_MODULES: backup-s3
          BACKUP_S3_BUCKET: pwbs-backups
          BACKUP_S3_ENDPOINT: minio:9000
          BACKUP_S3_USE_SSL: "false"
          AWS_ACCESS_KEY_ID: minioadmin
          AWS_SECRET_ACCESS_KEY: minioadmin
        ports:
          - 8080:8080
      minio:
        image: minio/minio:latest
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        ports:
          - 9000:9000

    steps:
      - uses: actions/checkout@v4

      - name: Wait for Weaviate
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/v1/.well-known/ready && break
            sleep 2
          done

      - name: Create S3 bucket
        run: |
          sudo apt-get update && sudo apt-get install -y awscli
          aws configure set aws_access_key_id minioadmin
          aws configure set aws_secret_access_key minioadmin
          aws --endpoint-url http://localhost:9000 s3 mb s3://pwbs-backups || true

      - name: Seed and create backup
        env:
          WEAVIATE_URL: http://localhost:8080
        run: |
          curl -sf -X POST http://localhost:8080/v1/schema \
            -H "Content-Type: application/json" \
            -d '{"class":"TestDoc","properties":[{"name":"title","dataType":["text"]}]}'
          bash infra/backup/backup_weaviate.sh
          echo "Weaviate backup test PASSED"

  summary:
    name: Report
    needs: [postgres-restore, weaviate-backup]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Report results
        run: echo "Backup-restore integration tests complete"
