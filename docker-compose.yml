# PWBS  Docker Compose fuer lokale Entwicklung
# Startet alle Backing-Services + Backend + Frontend
#
# Nutzung:
#   docker compose up -d
#   docker compose logs -f api
#
# Umgebungsvariablen werden aus .env geladen (siehe .env.example).

services:
  #  Backend API
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://pwbs:pwbs_dev@postgres:5432/pwbs
      - WEAVIATE_URL=http://weaviate:8080
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=dev_password
      - REDIS_URL=redis://redis:6379/0
      - APP_ENV=development
    depends_on:
      postgres:
        condition: service_healthy
      weaviate:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn pwbs.api.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  #  PostgreSQL
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: pwbs
      POSTGRES_USER: pwbs
      POSTGRES_PASSWORD: pwbs_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pwbs -d pwbs"]
      interval: 5s
      timeout: 5s
      retries: 5

  #  Weaviate (Vektorsuche)
  weaviate:
    image: semitechnologies/weaviate:1.28.2
    ports:
      - "8080:8080"
      - "50051:50051"
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
      DEFAULT_VECTORIZER_MODULE: "none"
      CLUSTER_HOSTNAME: "node1"
    volumes:
      - weaviate_data:/var/lib/weaviate
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/.well-known/ready"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  #  Neo4j (Knowledge Graph)
  neo4j:
    image: neo4j:5.26-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/dev_password
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 10s
      retries: 5
    restart: unless-stopped

#  Redis (AOF persistence enabled for queue reliability – TASK-121)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --appendfsync everysec
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  #  Celery Worker – Ingestion queues (TASK-121)
  celery-worker-ingestion:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://pwbs:pwbs_dev@postgres:5432/pwbs
      - WEAVIATE_URL=http://weaviate:8080
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=dev_password
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - APP_ENV=development
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: celery -A pwbs.queue.celery_app worker -Q ingestion.high,ingestion.bulk -c 4 --loglevel=info
    restart: unless-stopped

  #  Celery Worker – Processing queues (TASK-121)
  celery-worker-processing:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://pwbs:pwbs_dev@postgres:5432/pwbs
      - WEAVIATE_URL=http://weaviate:8080
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=dev_password
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - APP_ENV=development
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: celery -A pwbs.queue.celery_app worker -Q processing.embed,processing.extract -c 2 --loglevel=info
    restart: unless-stopped

  #  Celery Worker – Briefing queue (TASK-121)
  celery-worker-briefing:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://pwbs:pwbs_dev@postgres:5432/pwbs
      - WEAVIATE_URL=http://weaviate:8080
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=dev_password
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - APP_ENV=development
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: celery -A pwbs.queue.celery_app worker -Q briefing.generate -c 2 --loglevel=info
    restart: unless-stopped

  #  Celery Beat – Scheduler (TASK-121)
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - APP_ENV=development
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A pwbs.queue.celery_app beat --loglevel=info
    restart: unless-stopped

  #  Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      api:
        condition: service_started
    command: npm run dev
    restart: unless-stopped

  # ── Monitoring (TASK-166) ──────────────────────────────────────────
  # Activate with: docker compose --profile monitoring up -d
  prometheus:
    image: prom/prometheus:v2.53.0
    profiles: ["monitoring"]
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.0
    profiles: ["monitoring"]
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: pwbs_dev
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped

  # ── Plausible Analytics (TASK-179) ─────────────────────────────────
  # DSGVO-konformes Analytics ohne Cookies.
  # Activate with: docker compose --profile analytics up -d
  plausible-db:
    image: postgres:16-alpine
    profiles: ["analytics"]
    volumes:
      - plausible_db_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: plausible
      POSTGRES_USER: plausible
      POSTGRES_PASSWORD: plausible_dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plausible -d plausible"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  plausible-events-db:
    image: clickhouse/clickhouse-server:24.3-alpine
    profiles: ["analytics"]
    volumes:
      - plausible_events_data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    restart: unless-stopped

  plausible:
    image: ghcr.io/plausible/community-edition:v2.1
    profiles: ["analytics"]
    ports:
      - "8100:8000"
    environment:
      DATABASE_URL: postgres://plausible:plausible_dev@plausible-db:5432/plausible
      CLICKHOUSE_DATABASE_URL: http://plausible-events-db:8123/plausible_events
      SECRET_KEY_BASE: "pwbs-dev-plausible-secret-key-base-change-in-production-at-least-64-chars!!"
      BASE_URL: http://localhost:8100
      DISABLE_REGISTRATION: invite_only
    depends_on:
      plausible-db:
        condition: service_healthy
      plausible-events-db:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
  weaviate_data:
  neo4j_data:
  redis_data:
  prometheus_data:
  grafana_data:
  plausible_db_data:
  plausible_events_data:
