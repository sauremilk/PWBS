# Pre-Commit Hooks – https://pre-commit.com
# Installieren: pre-commit install (einmalig)
# Ausführen:    pre-commit run --all-files (manuell)

repos:
  # ── Allgemeine Checks ──────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
        exclude: ^deploy/helm/  # Helm-Templates verwenden Go-Template-Syntax {{ }}
      - id: check-json
        exclude: ^\.vscode/  # .vscode/*.json sind JSONC (mit Kommentaren)
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: detect-private-key
      - id: check-merge-conflict

  # ── Python: Ruff (Linting + Formatting) ─────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.0
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python, pyi]
      - id: ruff-format
        types_or: [python, pyi]

  # ── Python: Mypy (Type-Checking) ────────────────────────
  # Mypy läuft in der CI (backend-lint job, continue-on-error: true).
  # Lokal nicht erzwungen da Python 3.12 als python3.12 Executable benötigt wird.
  # Manuell ausführen: cd backend && mypy pwbs/ --strict
  # - repo: https://github.com/pre-commit/mirrors-mypy

  # ── Commit-Message: Conventional Commits ────────────────
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.6.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args:
          - feat
          - fix
          - refactor
          - perf
          - test
          - docs
          - chore
          - ci
          - build
          - security
          - claim
